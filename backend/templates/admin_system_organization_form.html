<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ app_name }} OV</title>
    <link rel="icon" href="{{ url_for('static', filename='club-payment-logo.svg') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='admin.css') }}">
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="{{ url_for('admin_system_organizations') }}">
        <img class="brand-logo" src="{{ url_for('static', filename='club-payment-logo.svg') }}" alt="">
        <span>{{ app_name }}</span>
      </a>
      <nav class="nav">
        <a class="nav-link active" href="{{ url_for('admin_system_organizations') }}">OVs</a>
        <a class="nav-link" href="{{ url_for('admin_web_account') }}">Konto</a>
      </nav>
      <form method="post" action="{{ url_for('admin_web_logout') }}">
        <button class="secondary" type="submit">Abmelden</button>
      </form>
    </header>

    <main class="page">
      <section class="page-heading">
        <p class="eyebrow">Angemeldet als {{ admin_name }} &middot; System-Admin</p>
        <h1>{{ 'OV bearbeiten' if organization else 'OV anlegen' }}</h1>
      </section>

      {% if error_message %}
      <p class="alert">{{ error_message }}</p>
      {% endif %}

      <section class="grid two">
        <article class="panel">
          <h2>Stammdaten</h2>
          <form class="form-grid" method="post">
            <label for="name">Name</label>
            <input id="name" name="name" type="text" value="{{ organization.name if organization else '' }}" required>

            <label for="dok">DOK</label>
            <input id="dok" name="dok" type="text" value="{{ organization.dok if organization else '' }}" required>

            <label for="slug">Slug</label>
            <input id="slug" name="slug" type="text" value="{{ organization.slug if organization else '' }}">

            <label for="platform_fee_basis_points">Plattformgebuehr</label>
            <input
              id="platform_fee_basis_points"
              name="platform_fee_basis_points"
              type="number"
              min="0"
              max="10000"
              step="1"
              value="{{ organization.platform_fee_basis_points if organization else 100 }}"
              required
            >

            <label for="address_line1">Adresse</label>
            <input id="address_line1" name="address_line1" type="text" value="{{ organization.address_line1 if organization else '' }}">

            <label for="address_postal_code">PLZ</label>
            <input id="address_postal_code" name="address_postal_code" type="text" value="{{ organization.address_postal_code if organization else '' }}">

            <label for="address_city">Ort</label>
            <input id="address_city" name="address_city" type="text" value="{{ organization.address_city if organization else '' }}">

            <label for="address_country">Land</label>
            <input id="address_country" name="address_country" type="text" maxlength="2" value="{{ organization.address_country if organization else 'DE' }}">

            <label class="checkline" for="active">
              <input id="active" name="active" type="checkbox" {% if not organization or organization.active %}checked{% endif %}>
              Aktiv
            </label>

            <button type="submit">Speichern</button>
          </form>
        </article>

        {% if organization %}
        <article class="panel">
          <h2>OV-Admin anlegen</h2>
          <form class="stack" method="post" action="{{ url_for('admin_system_create_ov_admin', slug=organization.slug) }}">
            <label for="username">Benutzername</label>
            <input id="username" name="username" type="text" autocomplete="username" required>
            <label for="password">Passwort</label>
            <input id="password" name="password" type="password" autocomplete="new-password" required>
            <button type="submit">OV-Admin erstellen</button>
          </form>

          <hr>

          <form class="inline-form" method="post" action="{{ url_for('admin_system_organization_enable' if not organization.active else 'admin_system_organization_disable', slug=organization.slug) }}">
            <button class="{{ 'secondary' if not organization.active else 'danger' }}" type="submit">
              {{ 'Aktivieren' if not organization.active else 'Deaktivieren' }}
            </button>
          </form>
        </article>
        {% endif %}
      </section>
    </main>
    {% include "_footer.html" %}
  </body>
</html>
