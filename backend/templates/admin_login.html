<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Login</title>
    <link rel="icon" href="{{ url_for('static', filename='club-payment-logo.svg') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='admin.css') }}">
  </head>
  <body class="auth-page">
    <main class="auth-shell">
      <section class="panel auth-panel">
        <div class="brand-block">
          <img class="brand-logo" src="{{ url_for('static', filename='club-payment-logo.svg') }}" alt="">
          <div>
            <p class="eyebrow">Club Payment</p>
            <h1>Admin-Anmeldung</h1>
          </div>
        </div>

        {% if error_message %}
        <p class="alert">{{ error_message }}</p>
        {% endif %}

        <form class="stack" method="post" action="{{ url_for('admin_web_login') }}">
          <label for="username">Benutzername</label>
          <input id="username" name="username" type="text" autocomplete="username" required>

          <label for="password">Passwort</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required>

          <button type="submit">Anmelden</button>
        </form>
      </section>
    </main>
  </body>
</html>
