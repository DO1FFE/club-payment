<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <title>Admin Produktverwaltung</title>
  </head>
  <body>
    <h1>Produktverwaltung</h1>
    <p>Angemeldet als: {{ admin_name }}</p>
    <nav>
      <a href="{{ url_for('admin_web_users') }}">Nutzer &amp; Ger&auml;te</a>
      |
      <a href="{{ url_for('admin_web_products') }}">Produkte</a>
    </nav>
    <form method="post" action="{{ url_for('admin_web_logout') }}">
      <button type="submit">Abmelden</button>
    </form>

    {% if error_message %}
    <p style="color: #b00020;">{{ error_message }}</p>
    {% endif %}

    <h2>Vorhandene Produkte</h2>
    <table border="1" cellpadding="4">
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Preis</th>
          <th>Aktiv</th>
          <th>Aktion</th>
        </tr>
      </thead>
      <tbody>
        {% for product in products %}
        <tr>
          <form method="post" action="{{ url_for('admin_web_products') }}">
            <td>{{ product.id }}<input type="hidden" name="product_id" value="{{ product.id }}"></td>
            <td><input name="name" type="text" value="{{ product.name }}" required></td>
            <td><input name="price" type="text" inputmode="decimal" value="{{ format_price_euros(product.price_cents) }}" required></td>
            <td><input name="active" type="checkbox" {% if product.active %}checked{% endif %}></td>
            <td>
              <input type="hidden" name="action" value="update">
              <button type="submit">Speichern</button>
            </td>
          </form>
        </tr>
        {% endfor %}
      </tbody>
    </table>

    <h2>Neues Produkt anlegen</h2>
    <form method="post" action="{{ url_for('admin_web_products') }}">
      <input type="hidden" name="action" value="create">
      <label for="name">Name</label>
      <input id="name" name="name" type="text" required>
      <br>
      <label for="price">Preis in Euro</label>
      <input id="price" name="price" type="text" inputmode="decimal" placeholder="1,50" required>
      <br>
      <label for="active">Aktiv</label>
      <input id="active" name="active" type="checkbox" checked>
      <br>
      <button type="submit">Produkt erstellen</button>
    </form>
  </body>
</html>
