<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Produktverwaltung</title>
    <link rel="icon" href="{{ url_for('static', filename='club-payment-logo.svg') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='admin.css') }}">
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="{{ url_for('admin_web_users') }}">
        <img class="brand-logo" src="{{ url_for('static', filename='club-payment-logo.svg') }}" alt="">
        <span>Club Payment</span>
      </a>
      <nav class="nav">
        <a class="nav-link" href="{{ url_for('admin_web_users') }}">Nutzer &amp; Ger&auml;te</a>
        <a class="nav-link active" href="{{ url_for('admin_web_products') }}">Produkte</a>
      </nav>
      <form method="post" action="{{ url_for('admin_web_logout') }}">
        <button class="secondary" type="submit">Abmelden</button>
      </form>
    </header>

    <main class="page">
      <section class="page-heading">
        <p class="eyebrow">Angemeldet als {{ admin_name }}</p>
        <h1>Produktverwaltung</h1>
      </section>

      {% if error_message %}
      <p class="alert">{{ error_message }}</p>
      {% endif %}

      <section class="panel">
        <h2>Neues Produkt anlegen</h2>
        <form class="form-grid" method="post" action="{{ url_for('admin_web_products') }}">
          <input type="hidden" name="action" value="create">
          <label for="name">Name</label>
          <input id="name" name="name" type="text" required>
          <label for="price">Preis in Euro</label>
          <input id="price" name="price" type="text" inputmode="decimal" placeholder="1,50" required>
          <label class="checkline" for="active">
            <input id="active" name="active" type="checkbox" checked>
            Aktiv
          </label>
          <button type="submit">Produkt erstellen</button>
        </form>
      </section>

      <section class="panel">
        <h2>Vorhandene Produkte</h2>
        <div class="product-list">
          {% for product in products %}
          <form class="product-row" method="post" action="{{ url_for('admin_web_products') }}">
            <input type="hidden" name="product_id" value="{{ product.id }}">
            <span class="muted">#{{ product.id }}</span>
            <input name="name" type="text" value="{{ product.name }}" required>
            <input name="price" type="text" inputmode="decimal" value="{{ format_price_euros(product.price_cents) }}" required>
            <label class="checkline">
              <input name="active" type="checkbox" {% if product.active %}checked{% endif %}>
              Aktiv
            </label>
            <button class="secondary" type="submit" name="action" value="update">Speichern</button>
            <button class="danger" type="submit" name="action" value="delete" formnovalidate>L&ouml;schen</button>
          </form>
          {% endfor %}
        </div>
      </section>
    </main>
    <footer class="copyright">Copyright Erik Schauer, do1ffe@darc.de</footer>
  </body>
</html>
